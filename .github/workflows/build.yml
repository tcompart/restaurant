name: Restaurant - Build and Analyze
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  restaurant-build:
    name: Restaurant - Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Start Docker Compose
        run: docker compose -f docker-compose.yml up -d

      - name: Wait for Postgres to be ready
        run: |
          echo "Waiting for PostgreSQL..."
          for i in {1..10}; do
            docker compose exec db pg_isready -U root && echo "Postgres is ready!" && exit 0
            echo "Not ready yet... retrying in 3s"
            sleep 3
          done
          echo "Postgres did not become ready in time" && exit 1

      - name: Run tests
        run: npm test

      - name: Stop Docker Compose
        if: always()
        run: docker compose -f docker-compose.yml down

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@45f27363d4ff7d6b16baa0516490f10c52bdd5fc
        if: ${{ github.actor != 'dependabot[bot]' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
